<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>ФОТОПРОГУЛКА</title>
    <style>
        :root { --bg: #0f0f12; --panel: #1a1a1f; --accent: #5e6ad2; --text: #e1e1e6; --text-dim: #71717a; --border: #27272a; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 400px; padding: 24px; }
        h1 { font-size: 20px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center; color: var(--text); }
        .instruction { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 30px; line-height: 1.6; }
        .status { padding: 16px; border: 1px solid var(--border); border-radius: 12px; text-align: center; margin-bottom: 20px; font-size: 14px; font-weight: 500; }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; position: relative; overflow: hidden; background: var(--accent); color: white; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0,0,0,0.2); width: 0%; pointer-events: none; }
        .panel { padding: 20px; border-radius: 16px; background: var(--panel); border: 1px solid var(--border); margin-top: 20px; }
        .slider-wrap { position: relative; height: 40px; margin-top: 10px; }
        .track { position: absolute; top: 18px; width: 100%; height: 2px; background: var(--border); }
        .ticks { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); padding: 0 4px; }
        input[type=range] { position: absolute; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; }
        input[type=range]::-webkit-slider-thumb { pointer-events: all; width: 16px; height: 16px; border-radius: 50%; background: var(--text); cursor: pointer; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: var(--text-dim); }
        .footer a { color: var(--accent); text-decoration: none; margin: 0 8px; }
    </style>
</head>
<body>

<div class="app">
    <h1>Фотопрогулка</h1>
    <div class="instruction">
        Надевай наушники, включай музыку и иди гулять. Удерживай кнопку «Стоп» (долгое нажатие) для выхода.
    </div>
    
    <div class="status" id="status">По готовности нажми СТАРТ</div>
    
    <button id="btn">
        <div class="hold-progress" id="progress"></div>
        <span id="btnText">СТАРТ</span>
    </button>

    <div class="panel">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:15px; color: var(--text-dim);">
            <span id="unitToggle" style="cursor:pointer; border-bottom: 1px dotted var(--text-dim);">Интервал (сек)</span>
            <span id="val" style="font-weight:bold; color: var(--text);">3 - 10</span>
        </div>
        <div class="slider-wrap">
            <div class="track"></div>
            <div class="ticks"><span>1</span><span>5</span><span>10</span><span>15</span></div>
            <input id="minR" type="range" min="1" max="15" value="3">
            <input id="maxR" type="range" min="1" max="15" value="10">
        </div>
        <div id="timerDisplay" style="text-align:center; margin-top:5px; color: var(--text-dim); font-size: 11px;">До сигнала: —</div>
    </div>
</div>

<script>
    const phrasesStart = ["Прогулка началась. Вдохновляйся моментом.", "Фотоохота включена. Наблюдай за городом.", "Начинаем снимать."];
    const phrasesShot = ["Внимание, снимай! У тебя минута.", "Лови момент! Время для кадра."];
    const phrasesWalk = ["Время вышло. Идем дальше.", "Снимок сделан? Продолжаем прогулку."];

    let audioCtx = null, backgroundNode = null, dummyAudio = null; 
    let state = 'idle', running = false, isMinutes = false; 
    let holdTimer;

    const workerCode = `
        let timer = null;
        self.onmessage = function(e) {
            if (e.data.action === 'start') {
                clearInterval(timer);
                let endTime = e.data.endTime;
                timer = setInterval(() => {
                    let timeLeft = Math.max(0, Math.round((endTime - Date.now()) / 1000));
                    self.postMessage({ action: 'tick', timeLeft: timeLeft, phase: e.data.phase });
                }, 500);
            } else if (e.data.action === 'stop') clearInterval(timer);
        };
    `;
    const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));

    function playSignal() {
        if (!audioCtx) return;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = 950;
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }, i * 400);
        }
    }

    function stopBackgroundAudio() {
        if (backgroundNode) { try { backgroundNode.stop(); } catch(e){} backgroundNode = null; }
        if (dummyAudio) { dummyAudio.pause(); dummyAudio.src = ""; dummyAudio = null; }
        if (audioCtx) { try { audioCtx.close(); audioCtx = null; } catch(e){} }
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "none";
    }

    function startBackgroundAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!backgroundNode) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.value = 20; gain.gain.value = 0.005;
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); backgroundNode = osc;
            
            if (!dummyAudio) {
                dummyAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD');
                dummyAudio.loop = true;
            }
            dummyAudio.play().catch(() => {});
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
                navigator.mediaSession.metadata = new MediaMetadata({ title: 'Фотопрогулка', artist: 'Олег Романов' });
            }
        }
    }

    function speak(text) {
        startBackgroundAudio();
        playSignal(); // Возвращаем звуковой сигнал
        speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'ru-RU';
        u.onend = u.onerror = () => stopBackgroundAudio(); 
        speechSynthesis.speak(u);
    }

    const btn = document.getElementById('btn');
    const prog = document.getElementById('progress');

    // Логика долгого нажатия
    btn.onpointerdown = () => {
        if (state === 'idle') return;
        let start = Date.now();
        holdTimer = setInterval(() => {
            let elapsed = Date.now() - start;
            prog.style.width = Math.min(100, elapsed / 10) + "%";
            if (elapsed > 1000) { 
                clearInterval(holdTimer);
                worker.postMessage({ action: 'stop' });
                stopBackgroundAudio();
                location.reload(); 
            }
        }, 30);
    };
    btn.onpointerup = btn.onpointerleave = () => { clearInterval(holdTimer); prog.style.width = "0%"; };

    btn.onclick = () => {
        if (state === 'idle') {
            state = 'walk'; running = true; btn.style.background = "#2e7d32"; 
            document.getElementById('btnText').textContent = "СТОП (держ)";
            speak(phrasesStart[Math.floor(Math.random() * phrasesStart.length)]);
            cycle();
        } else if (state === 'shot') {
            nextPhase();
        }
    };

    document.getElementById('minR').oninput = document.getElementById('maxR').oninput = () => {
        let min = document.getElementById('minR'), max = document.getElementById('maxR');
        if (+min.value > +max.value) min.value = max.value;
        document.getElementById('val').textContent = `${min.value} - ${max.value}`;
    };

    function cycle() {
        let sec = Math.floor(Math.random() * (+document.getElementById('maxR').value - +document.getElementById('minR').value + 1) + +document.getElementById('minR').value) * (isMinutes ? 60 : 1);
        document.getElementById('status').textContent = "Идёт прогулка";
        worker.postMessage({ action: 'start', endTime: Date.now() + sec * 1000, phase: 'walk' });
    }

    worker.onmessage = (e) => {
        if (e.data.phase === 'walk' && e.data.timeLeft <= 0) {
            state = 'shot'; speak(phrasesShot[Math.floor(Math.random() * phrasesShot.length)]);
            document.getElementById('status').textContent = "ДЕЛАЙ КАДР!";
            btn.style.background = "#fbc02d";
            worker.postMessage({ action: 'start', endTime: Date.now() + 60000, phase: 'shot' });
        } else if (e.data.phase === 'shot' && e.data.timeLeft <= 0) {
            nextPhase();
        } else if (e.data.phase === 'walk') {
            document.getElementById('timerDisplay').textContent = `До сигнала: ${e.data.timeLeft}с`;
        } else {
            document.getElementById('btnText').textContent = `КАДР СДЕЛАН (${e.data.timeLeft})`;
        }
    };

    function nextPhase() {
        state = 'walk'; speak(phrasesWalk[Math.floor(Math.random() * phrasesWalk.length)]);
        btn.style.background = "#2e7d32"; document.getElementById('btnText').textContent = "СТОП (держ)";
        cycle();
    }
</script>
</body>
</html>
