<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Фотопрогулка">
    
    <title>ФОТОПРОГУЛКА</title>
    <style>
        :root { 
            --bg: #0f0f12; --panel: #1a1a1f; --accent: #5e6ad2; 
            --text: #e1e1e6; --text-dim: #71717a; --border: #27272a;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 400px; padding: 24px; }
        h1 { font-size: 20px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center; color: var(--text); }
        .instruction { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 30px; line-height: 1.6; }
        .status { padding: 16px; border: 1px solid var(--border); border-radius: 12px; text-align: center; margin-bottom: 20px; font-size: 14px; font-weight: 500; }
        
        /* Кнопка */
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; position: relative; overflow: hidden; background: var(--accent); color: white; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0,0,0,0.2); width: 0%; pointer-events: none; }
        
        /* Панель настроек */
        .panel { padding: 20px; border-radius: 16px; background: var(--panel); border: 1px solid var(--border); margin-top: 20px; }
        .slider-wrap { position: relative; height: 40px; margin-top: 10px; }
        .track { position: absolute; top: 18px; width: 100%; height: 2px; background: var(--border); }
        /* Закраска диапазона */
        .track-fill { position: absolute; top: 18px; height: 2px; background: var(--accent); pointer-events: none; }
        .ticks { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); padding: 0 4px; }
        input[type=range] { position: absolute; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; }
        input[type=range]::-webkit-slider-thumb { pointer-events: all; width: 16px; height: 16px; border-radius: 50%; background: var(--text); cursor: pointer; }
        
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: var(--text-dim); }
        .footer a { color: var(--accent); text-decoration: none; margin: 0 8px; }
    </style>
</head>
<body>

<div class="app">
    <h1>Фотопрогулка 1.4</h1>
    <div class="instruction">
        Ходи по городу и делай фото. В случайный момент тебе поступит сигнал. У тебя будет ровно 1 минута, чтобы сделать кадр.
        <br><br>
        Удерживай кнопку «Стоп» для выхода.
    </div>
    
    <div class="status" id="status">По готовности нажми СТАРТ</div>
    
    <button id="btn">
        <div class="hold-progress" id="progress"></div>
        <span id="btnText">СТАРТ</span>
    </button>

    <div class="panel">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:15px; color: var(--text-dim);">
            <span id="unitToggle" style="cursor:pointer; border-bottom: 1px dotted var(--text-dim); user-select: none;">Интервал (мин)</span>
            <span id="val" style="font-weight:bold; color: var(--text);">3 - 10</span>
        </div>
        <div class="slider-wrap">
            <div class="track"></div>
            <div class="track-fill" id="trackFill"></div> <div class="ticks"><span>1</span><span>5</span><span>10</span><span>15</span></div>
            <input id="minR" type="range" min="1" max="15" value="3">
            <input id="maxR" type="range" min="1" max="15" value="10">
        </div>
        
        <div id="timerDisplay" style="text-align:center; margin-top:15px; color: var(--text-dim); font-size: 11px;">До сигнала: —</div>
    </div>

    <div class="footer">
        <div>Автор: Олег Романов</div>
        <div style="margin-top: 8px;">
            <a href="https://t.me/olegolezhek/">Телеграм канал</a> | 
            <a href="https://t.me/olegolezhek?direct">Сообщения</a>
        </div>
    </div>
</div>

<script>
    /* Данные фраз */
    const phrasesStart = ["Прогулка началась. Вдохновляйся моментом.", "Режим фотоохоты включен. Наблюдай за городом.", "Фотопрогулка активирована. Начинаем снимать.", "Город ждет твой лучший кадр. Погнали."];
    const phrasesShot = ["Внимание, снимай! У тебя минута.", "Лови момент! Время для кадра.", "Сделай этот кадр особенным. Пошел отсчет.", "Твой шанс! Делай максимально красивый снимок.", "Время пришло. В объективе — жизнь."];
    const phrasesWalk = ["Время вышло. Идем дальше.", "Кадр готов. Продолжаем прогулку.", "Снимок сделан? Отлично, ищем новый сюжет.", "Минута позади. Двигаемся к следующей точке.", "Заметь детали, которых никто не видит. Продолжаем прогулку.", "Меняй ракурс, ищи свет. Идем дальше.", "Не спеши, доверься интуиции. Продолжаем путь.", "Город — это твой холст. Идем дальше."];

    /* Переменные состояния */
    let audioCtx = null, backgroundNode = null, dummyAudio = null, state = 'idle', running = false;
    let isMinutes = true; 
    const btn = document.getElementById('btn'), prog = document.getElementById('progress'), unitToggle = document.getElementById('unitToggle');

    /* Воркер таймера */
    const workerCode = `
        let timer = null;
        self.onmessage = function(e) {
            if (e.data.action === 'start') {
                clearInterval(timer);
                let endTime = e.data.endTime;
                timer = setInterval(() => {
                    let timeLeft = Math.max(0, Math.round((endTime - Date.now()) / 1000));
                    self.postMessage({ action: 'tick', timeLeft: timeLeft, phase: e.data.phase });
                    if (timeLeft <= 0) clearInterval(timer);
                }, 250);
            } else if (e.data.action === 'stop') clearInterval(timer);
        };
    `;
    const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));

    /* Инициализация аудио-замка (фоновый режим) */
    function startBackgroundAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Генерация тишины для удержания аудио-сессии
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.frequency.value = 20; 
        gain.gain.value = 0.0001; 
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); backgroundNode = osc;
        
        // Фиктивное аудио для MediaSession
        if (!dummyAudio) { dummyAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD'); dummyAudio.loop = true; }
        dummyAudio.play().catch(() => {});
        
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: 'Фотопрогулка (активна)', artist: 'Олег Романов' });
            navigator.mediaSession.playbackState = "playing";
        }
    }

    /* Пикающий звук */
    function playBeep() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    /* Остановка аудио */
    function stopBackgroundAudio() {
        if (backgroundNode) { try { backgroundNode.stop(); } catch(e){} backgroundNode = null; }
        if (dummyAudio) { try { dummyAudio.pause(); dummyAudio.src = ""; dummyAudio = null; } catch(e){} }
        if (audioCtx) { try { audioCtx.close(); audioCtx = null; } catch(e){} }
    }

    /* Голосовое оповещение + звук */
    function speak(text) {
        playBeep(); // Пикаем перед речью
        speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        speechSynthesis.speak(utterance);
    }

    /* Обработка таймера */
    worker.onmessage = function(e) {
        if (!running) return;
        let timeLeft = e.data.timeLeft, phase = e.data.phase;
        if (phase === 'walk') {
            let displayTime = isMinutes && timeLeft >= 60 ? `${Math.floor(timeLeft / 60)}м ${timeLeft % 60}с` : `${timeLeft}с`;
            document.getElementById('timerDisplay').textContent = `До сигнала: ${displayTime}`;
            if (timeLeft <= 0) { worker.postMessage({ action: 'stop' }); triggerShot(); }
        } else if (phase === 'shot') {
            document.getElementById('btnText').textContent = `КАДР СДЕЛАН (${timeLeft})`;
            if (timeLeft <= 0) { worker.postMessage({ action: 'stop' }); nextPhase(); }
        }
    };

    /* Интерфейс */
    function updateUI() {
        let min = document.getElementById('minR'), max = document.getElementById('maxR');
        let fill = document.getElementById('trackFill');
        if (+min.value > +max.value) min.value = max.value;
        document.getElementById('val').textContent = `${min.value} - ${max.value}`;
        let minP = (min.value - min.min) / (min.max - min.min) * 100;
        let maxP = (max.value - max.min) / (max.max - max.min) * 100;
        fill.style.left = minP + "%";
        fill.style.width = (maxP - minP) + "%";
    }

    document.getElementById('minR').oninput = document.getElementById('maxR').oninput = updateUI;
    unitToggle.onclick = () => { isMinutes = !isMinutes; unitToggle.textContent = isMinutes ? "Интервал (мин)" : "Интервал (сек)"; updateUI(); };
    updateUI();

    /* Кнопка старта */
    btn.onclick = () => {
        if (state === 'idle') {
            state = 'walk'; running = true;
            btn.style.background = "#2e7d32";
            document.getElementById('btnText').textContent = "СТОП";
            startBackgroundAudio(); // Всегда запускаем аудио-замок
            speak(phrasesStart[Math.floor(Math.random() * phrasesStart.length)]);
            cycle();
        } else if (state === 'shot') { nextPhase(); }
    };

    /* Удержание кнопки стоп */
    let holdTimer;
    btn.onpointerdown = () => {
        if (state === 'idle') return;
        let start = Date.now();
        holdTimer = setInterval(() => {
            let elapsed = Date.now() - start;
            prog.style.width = Math.min(100, elapsed / 10) + "%";
            if (elapsed > 1000) { worker.postMessage({ action: 'stop' }); stopBackgroundAudio(); location.reload(); }
        }, 30);
    };
    btn.onpointerup = btn.onpointerleave = () => { clearInterval(holdTimer); prog.style.width = "0%"; };

    /* Логика фаз */
    function cycle() {
        if (!running) return;
        let minVal = +document.getElementById('minR').value, maxVal = +document.getElementById('maxR').value;
        let randomUnits = Math.floor(Math.random() * (maxVal - minVal + 1) + minVal);
        let endTime = Date.now() + randomUnits * (isMinutes ? 60 : 1) * 1000;
        document.getElementById('status').textContent = "Идёт прогулка";
        worker.postMessage({ action: 'start', endTime: endTime, phase: 'walk' });
    }

    function triggerShot() {
        state = 'shot';
        speak(phrasesShot[Math.floor(Math.random() * phrasesShot.length)]);
        document.getElementById('status').textContent = "ДЕЛАЙ КАДР!";
        btn.style.background = "#fbc02d"; btn.style.color = "#000";
        worker.postMessage({ action: 'start', endTime: Date.now() + 60000, phase: 'shot' });
    }

    function nextPhase() {
        state = 'walk';
        speak(phrasesWalk[Math.floor(Math.random() * phrasesWalk.length)]);
        btn.style.background = "#2e7d32"; btn.style.color = "#fff";
        document.getElementById('btnText').textContent = "СТОП";
        cycle();
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error', err));
        });
    }
</script>
</body>
</html>
